# Loaded from conf.d (http context). When TLS terminates on a host reverse proxy,
# requests reach this container as HTTP; $scheme would be wrong without using the
# client's original protocol from X-Forwarded-Proto.
map $http_x_forwarded_proto $real_forwarded_proto {
    ""      $scheme;
    default $http_x_forwarded_proto;
}

map $http_x_forwarded_host $real_forwarded_host {
    ""      $host;
    default $http_x_forwarded_host;
}

# Used by WebSocket locations: only send Connection: upgrade when client sent Upgrade.
# If an outer proxy strips Upgrade but inner nginx forced Connection "upgrade", Tomcat returns HTTP 400.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}
