# Optional: publish the UI on the host (e.g. http://192.168.x.x:3000).
# Compose merges this with the base file — only one ports entry for frontend.
#
#   docker-compose -f docker-compose.yml -f docker-compose.lan.yml up -d
#
# Change host port: FRONTEND_PUBLISHED_PORT=3001 in .env

services:
  frontend:
    ports:
      - "0.0.0.0:${FRONTEND_PUBLISHED_PORT:-3000}:80/tcp"
