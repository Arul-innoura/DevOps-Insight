# NGINX local HTTPS reverse-proxy (mkcert)
# - Terminates HTTPS on 443 for a LOCAL domain name (hosts file)
# - Proxies to Docker frontend on http://127.0.0.1:3000
#
# 1) Create certs (on server):
#    sudo mkdir -p /etc/nginx/certs
#    cd /etc/nginx/certs
#    sudo mkcert -key-file shipit.key -cert-file shipit.crt shipit.encipherhealth.com
#
# 2) Install this file to:
#    /etc/nginx/sites-available/shipit.encipherhealth.com
#    then symlink into sites-enabled and restart nginx.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name shipit.encipherhealth.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name shipit.encipherhealth.com;

    ssl_certificate     /etc/nginx/certs/shipit.crt;
    ssl_certificate_key /etc/nginx/certs/shipit.key;

    # Modern TLS defaults (safe for local)
    ssl_protocols TLSv1.2 TLSv1.3;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}

