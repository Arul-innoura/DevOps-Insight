# Caddy on 80/443 → frontend:80 (internal Docker network only; no host port on frontend).
#
#   docker-compose -f docker-compose.yml -f deploy/docker-compose.caddy.yml up -d --build
#
# If `docker compose` fails with "unknown shorthand flag: 'f'", use `docker-compose` (hyphen).
# See deploy/DEPLOY.md for LAN (port 3000), Azure, and troubleshooting.
#
# Do not add frontend.ports here — Compose merges lists; duplicates break with "address already in use".

services:
  caddy:
    image: caddy:2-alpine
    container_name: devops-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./deploy/Caddyfile.docker:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      frontend:
        condition: service_started

volumes:
  caddy_data:
  caddy_config:
