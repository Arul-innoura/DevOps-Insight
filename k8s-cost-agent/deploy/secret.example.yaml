# EXAMPLE — copy to secret.yaml, fill in, then `kubectl apply -f secret.yaml`.
# Do NOT commit secret.yaml. The agent only needs the Mongo URI here; rotate
# it through the Azure backend rotation that owns the connection string.
apiVersion: v1
kind: Secret
metadata:
  name: k8s-cost-agent
  namespace: k8s-cost-agent
type: Opaque
stringData:
  AGENT_MONGODB_URI: "mongodb+srv://USER:PASS@HOST/?retryWrites=true&w=majority"
